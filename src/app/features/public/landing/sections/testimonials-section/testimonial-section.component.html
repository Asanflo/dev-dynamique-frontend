<section class="px-6 md:px-12 py-16 md:py-24 lg:px-25 overflow-hidden">

    <div class="flex flex-col gap-3 mb-12 items-center text-center">
      <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold leading-tight text-gray-900"
          appScrollReveal revealDirection="right" revealDelay="100ms">
        Les retours d'<span class="text-[#73B51B]">expérience</span>
      </h1>
      <p class="text-gray-500 text-base md:text-lg leading-relaxed max-w-xl"
         appScrollReveal revealDirection="up" revealDelay="150ms">
        Nos utilisateurs expliquent comment la plateforme leur permet de gagner en organisation,
        en visibilité et en efficacité dans leurs projets.
      </p>
      <div class="flex flex-row text-[12px] gap-2 py-1 px-2 bg-gray-300 rounded-2xl w-42 justify-center">
        <fa-icon [icon]="faStar" class="text-[#ED8124]"></fa-icon>
        <p class="font-semibold">4.5 <span class="text-gray-400"> de + 1000 boîtes</span></p>
      </div>
    </div>
  </div>
