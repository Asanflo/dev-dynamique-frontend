<section class="relative flex flex-col-reverse md:flex-row items-center px-6 md:px-12 py-8 md:py-5 h-max overflow-hidden gap-10 md:gap-0">

  <!-- Blobs et dot grid inchangés -->
  <div class="absolute top-[-80px] right-[-60px] w-[420px] h-[420px] rounded-full opacity-20 blur-3xl pointer-events-none"
       style="background: #73B51B;"></div>
  <div class="absolute bottom-[-80px] left-[5%] w-[320px] h-[320px] rounded-full opacity-15 blur-3xl pointer-events-none"
       style="background: #ED8124;"></div>
  <div class="absolute right-10 bottom-8 opacity-10 pointer-events-none"
       style="background-image: radial-gradient(#73B51B 1.5px, transparent 1.5px); background-size: 18px 18px; width: 150px; height: 150px;"></div>

  <!-- Colonne texte -->
  <div class="w-full md:w-1/2 md:pl-10 flex flex-col gap-6 relative z-10 text-center md:text-left items-center md:items-start">

    <h1 class="text-3xl md:text-5xl font-extrabold leading-tight text-gray-900"
        appScrollReveal revealDirection="up" revealDelay="0ms">
      Pilotez vos projets avec
      <span class="relative inline-block text-[#73B51B]">
        clarté
        <svg class="absolute -bottom-1 left-0 w-full" height="6" viewBox="0 0 100 6" preserveAspectRatio="none">
          <path d="M0,5 Q50,0 100,5" stroke="#ED8124" stroke-width="2.5" fill="none"/>
        </svg>
      </span>
      et <span class="text-[#73B51B]">précision</span>
    </h1>

    <p class="text-gray-500 text-base md:text-lg md:text-left leading-relaxed"
       appScrollReveal revealDirection="up" revealDelay="150ms">
      Organisez vos projets, planifiez vos tâches, visualisez vos échéances et retrouvez instantanément l'information dont vous avez besoin. Aproj transforme la complexité en efficacité.
    </p>

    <button
      routerLink="/inscription"
      class="w-fit rounded-full border-2 border-[#ED8124] bg-[#ED8124] px-6 py-[10px] font-semibold text-white transition-all duration-200 hover:-translate-y-px hover:border-[#d46f1d] hover:bg-[#d46f1d] hover:shadow-[0_4px_12px_rgba(237,129,36,0.35)]">
      Commencer
    </button>

  </div>

  <!-- Colonne images -->
  <div class="w-full md:w-1/2 flex gap-4 md:gap-6 items-center justify-center relative z-10">

    <!-- sec1 + sec2 empilées -->
    <div class="flex flex-col gap-4 md:gap-6">
      <img src="/sec1.jpeg" alt="Image secondaire 1"
           class="object-cover rounded-2xl shadow-md float-1"
           style="width: 38vw; height: 38vw; max-width: 280px; max-height: 280px;"
           appScrollReveal revealDirection="right" revealDelay="100ms">
      <img src="/sec2.jpeg" alt="Image secondaire 2"
           class="object-cover rounded-2xl shadow-md float-2"
           style="width: 38vw; height: 38vw; max-width: 280px; max-height: 280px;"
           appScrollReveal revealDirection="right" revealDelay="250ms">
    </div>

    <!-- princ1 grande -->
    <div class="flex items-center justify-center"
         appScrollReveal revealDirection="right" revealDelay="150ms">
      <img src="/princ1.jpeg" alt="Image principale"
           class="object-cover rounded-2xl shadow-lg float-3"
           style="width: 38vw; height: 65vw; max-width: 280px; max-height: 440px;">
    </div>

  </div>

</section>
