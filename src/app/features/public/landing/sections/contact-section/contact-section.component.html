<section class="px-4 sm:px-6 md:px-12 lg:px-20 xl:px-40 py-16 md:py-24">
  <div class="flex flex-col md:flex-row items-start gap-12">

    <!-- TEXTE -->
    <div class="w-full md:w-1/2 flex flex-col pt-9 gap-6 text-center md:text-left items-center md:items-start">

      <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-gray-900"
          appScrollReveal revealDirection="right" revealDelay="100ms">
        Contactez <span class="text-[#73B51B]">nous</span>
      </h1>

      <p class="text-gray-500 text-base md:text-lg max-w-md"
         appScrollReveal revealDirection="up" revealDelay="150ms">
        Une question, une suggestion ou un besoin spécifique ?
        Notre équipe est disponible pour vous accompagner.
      </p>

    </div>

    <!-- FORMULAIRE -->
    <div class="w-full md:w-1/2 flex justify-center"
         appScrollReveal revealDirection="left" revealDelay="0ms">

      <form class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 md:p-8 flex flex-col gap-5">

        <!-- Nom -->
        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Nom complet *</label>
          <input type="text"
                 class="border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#73B51B]"
                 placeholder="Votre nom complet">
        </div>

        <!-- Email -->
        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Adresse email *</label>
          <input type="email"
                 class="border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#73B51B]"
                 placeholder="exemple@email.com">
        </div>

        <!-- Message -->
        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Votre message</label>
          <textarea rows="4"
                    class="border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#73B51B]"
                    placeholder="Écrivez votre message..."></textarea>
        </div>

        <!-- Button -->
        <button type="submit" class="w-fit rounded-full border-2 border-[#ED8124] bg-[#ED8124] px-6 py-[10px] font-semibold text-white transition-all duration-200
            hover:-translate-y-px hover:border-[#d46f1d] hover:bg-[#d46f1d] hover:shadow-[0_4px_12px_rgba(237,129,36,0.35)]">
          Envoyer
        </button>

      </form>

    </div>

  </div>
</section>
