<section class="pricing-section relative flex flex-col items-center px-6 md:px-12 py-16 overflow-hidden gap-12">


  <!-- Header -->
  <div class="text-center flex flex-col items-center gap-4 relative z-10">

    <h2 class="text-3xl md:text-5xl font-extrabold text-gray-900 leading-tight">
      Choisissez votre
      <span class="relative inline-block text-[#73B51B]">
        formule
      </span>
    </h2>
    <p class="text-gray-500 text-base md:text-lg max-w-xl">
      Commencez gratuitement et évoluez selon vos besoins. Pas de surprise, pas de frais cachés.
    </p>

    <!-- Toggle mensuel / annuel -->
    <div class="billing-toggle mt-2" role="group" aria-label="Période de facturation">
      <button
        class="toggle-btn"
        [class.active]="billingCycle === 'monthly'"
        (click)="setBilling('monthly')">
        Mensuel
      </button>
      <button
        class="toggle-btn relative"
        [class.active]="billingCycle === 'yearly'"
        (click)="setBilling('yearly')">
        Annuel
        <span class="saving-badge">-20%</span>
      </button>
    </div>
  </div>

  <!-- Cards -->
  <div class="pricing-grid relative z-10">
    <div
      *ngFor="let plan of plans; let i = index"
      class="pricing-card"
      [class.featured]="plan.featured"
      [style.animation-delay]="i * 100 + 'ms'">

      <!-- Badge popular -->
      <div *ngIf="plan.featured" class="featured-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01z"/></svg>
        Populaire
      </div>

      <!-- Plan header -->
      <div class="plan-header">
        <h3 class="plan-name">{{ plan.name }}</h3>
        <p class="plan-tagline">{{ plan.tagline }}</p>
      </div>

      <!-- Prix -->
      <div class="plan-price">
        <span class="currency">FCFA</span>
        <span class="amount">{{ getPrice(plan) }}</span>
        <span class="period">/ mois<span *ngIf="plan.perUser"> / utilisateur</span></span>
      </div>
      <p *ngIf="getAnnualNote(plan)" class="annual-note">{{ getAnnualNote(plan) }}</p>

      <div class="divider"></div>

      <!-- Features -->
      <ul class="features-list">
        <li *ngFor="let feature of plan.features" class="feature-item">
          <span class="feature-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
          <span class="feature-text">{{ feature }}</span>
        </li>
      </ul>

      <!-- Add-on optionnel -->
      <div *ngIf="plan.addon" class="addon-row">
        <input type="checkbox" [id]="'addon-' + i" class="addon-checkbox">
        <label [for]="'addon-' + i" class="addon-label">
          {{ plan.addon.label }}
          <span class="addon-price">+{{ plan.addon.price }}/mois</span>
        </label>
        <button class="addon-info" title="En savoir plus"></button>
      </div>

      <!-- CTA -->
      <button class="cta-btn" [class.cta-primary]="plan.featured" [class.cta-secondary]="!plan.featured">
        <span *ngIf="plan.ctaIcon === 'apple'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        </span>
        {{ plan.ctaLabel }}
      </button>

    </div>
  </div>

</section>
