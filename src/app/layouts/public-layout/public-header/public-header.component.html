<header class="relative">

  <!-- Header -->
  <div class="px-10 flex shadow-sm items-center justify-between bg-white md:py-0 py-4">

    <!-- Logo -->
    <div>
      <img src="LOGO_fb.png" class="hidden md:block w-30" />
      <img src="mini_logo.png" class="block md:hidden w-10" />
    </div>

    <!-- Desktop Menu -->
    <nav class="hidden md:flex gap-10 font-medium">
      <a (click)="scrollTo('hero')" class="nav-link">
        <span class="mr-2 text-[#ED8124]"><fa-icon [icon]="faHouse"></fa-icon></span>Accueil
      </a>
      <a (click)="scrollTo('features')" class="nav-link">
        <span class="mr-2 text-[#ED8124]"><fa-icon [icon]="faStar"></fa-icon></span>Fonctionnalités
      </a>
      <a (click)="scrollTo('pricing')" class="nav-link">
        <span class="mr-2 text-[#ED8124]"><fa-icon [icon]="faTag"></fa-icon></span>Tarifs
      </a>
      <a (click)="scrollTo('about')" class="nav-link">
        <span class="mr-2 text-[#ED8124]"><fa-icon [icon]="faCircleInfo"></fa-icon></span>À propos
      </a>
    </nav>

    <!-- Desktop Buttons -->
    <!-- Desktop Buttons -->
    <div class="hidden md:flex gap-6 items-center">

      <button
        routerLink="/inscription"
        class="w-fit rounded-full border-2 border-[#ED8124] bg-[#ED8124] px-6 py-[10px] text-sm font-semibold text-white transition-all duration-200 hover:-translate-y-px hover:border-[#d46f1d] hover:bg-[#d46f1d] hover:shadow-[0_4px_12px_rgba(237,129,36,0.35)]">
        S'inscrire
      </button>

      <button
        routerLink="/connexion"
        class="w-fit rounded-full border-[1.5px] border-[#73B51B] bg-transparent px-4 py-[10px] text-sm font-semibold text-[#73B51B] transition-all duration-200 hover:-translate-y-px hover:bg-[#73B51B] hover:text-white hover:shadow-[0_4px_12px_rgba(115,181,27,0.25)]">
        Se connecter
      </button>

    </div>

    <!-- Hamburger Button -->
    <button class="md:hidden flex flex-col gap-1.5 z-50" (click)="isOpen = !isOpen">
      <span class="w-6 h-0.5 bg-black transition-all"
            [class.rotate-45]="isOpen"
            [class.translate-y-2]="isOpen"></span>
      <span class="w-6 h-0.5 bg-black transition-all"
            [class.opacity-0]="isOpen"></span>
      <span class="w-6 h-0.5 bg-black transition-all"
            [class.-rotate-45]="isOpen"
            [class.-translate-y-2]="isOpen"></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div
    *ngIf="isOpen"
    class="md:hidden absolute top-full left-0 w-full bg-white shadow-lg z-40 px-8 py-6 flex flex-col gap-6">

    <!-- Menu Links -->
    <nav class="flex flex-col gap-4 text-lg font-medium">
      <a (click)="scrollTo('hero')" class="mobile-link">
        <span class="mr-3 text-[#ED8124]"><fa-icon [icon]="faHouse"></fa-icon></span>Accueil
      </a>
      <a (click)="scrollTo('features')" class="mobile-link">
        <span class="mr-3 text-[#ED8124]"><fa-icon [icon]="faStar"></fa-icon></span>Fonctionnalités
      </a>
      <a (click)="scrollTo('pricing')" class="mobile-link">
        <span class="mr-3 text-[#ED8124]"><fa-icon [icon]="faTag"></fa-icon></span>Tarifs
      </a>
      <a (click)="scrollTo('about')" class="mobile-link">
        <span class="mr-3 text-[#ED8124]"><fa-icon [icon]="faCircleInfo"></fa-icon></span>A propos
      </a>
    </nav>

    <!-- Buttons -->
    <div class="flex flex-col gap-3">
      <button
        routerLink="/inscription"
        class="w-full rounded-full border-2 border-[#ED8124] bg-[#ED8124] px-6 py-[10px] text-sm font-semibold text-white transition-all duration-200 hover:-translate-y-px hover:border-[#d46f1d] hover:bg-[#d46f1d] hover:shadow-[0_4px_12px_rgba(237,129,36,0.35)]">
        S'inscrire
      </button>

      <button class="w-full rounded-full border-[1.5px] border-[#73B51B] bg-transparent px-4 py-[10px] text-sm font-semibold text-[#73B51B] transition-all duration-200 hover:-translate-y-px hover:bg-[#73B51B] hover:text-white hover:shadow-[0_4px_12px_rgba(115,181,27,0.25)]">
        Se connecter
      </button>
    </div>

  </div>

</header>
