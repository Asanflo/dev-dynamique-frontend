<div>
  <!-- Promo Bar : disparaît au scroll -->
  <div [class.promo-hidden]="isSticky">
    <app-promo-bar></app-promo-bar>
  </div>

  <!-- Header : devient fixe quand la promo bar disparaît -->
  <div [class.header-sticky]="isSticky">
    <app-public-header></app-public-header>
  </div>

  <!-- Contenu principal -->
  <main [class.content-offset]="isSticky">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer de la landing page -->
  <div>
    <app-public-footer></app-public-footer>
  </div>
</div>
